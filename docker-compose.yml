version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: orderflow-postgres
    environment:
      POSTGRES_DB: orderflow
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow123
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: "2000"
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: "1000"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orderflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: orderflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: orderflow
      RABBITMQ_DEFAULT_PASS: orderflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - orderflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orderflow-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderflow
      SPRING_DATASOURCE_USERNAME: orderflow
      SPRING_DATASOURCE_PASSWORD: orderflow123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: orderflow
      SPRING_RABBITMQ_PASSWORD: orderflow123
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
      # Debug apenas no processo filho (fork do spring-boot:run)
      MAVEN_OPTS: "-Dspring-boot.run.jvmArguments=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ./src:/app/src
      - ./target:/app/target
      - ./pom.xml:/app/pom.xml
      - maven-repo:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - orderflow-network
    restart: on-failure:3  # Limita tentativas, não loop infinito

  web:
    build:
      context: ../orderflow-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: orderflow-web
    ports:
      - "4173:80"
    depends_on:
      app:
        condition: service_started
    networks:
      - orderflow-network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  maven-repo:

networks:
  orderflow-network:
    driver: bridge